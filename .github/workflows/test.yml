name: API Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'osa13/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'osa13/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: osa13
        run: npm ci

      - name: Start application
        working-directory: osa13
        run: npm start > app.log 2>&1 &
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db?sslmode=disable
          PORT: 3001
          SECRET: test_secret

      - name: Wait for application to be ready
        working-directory: osa13
        run: npx wait-on http://localhost:3001 -t 30000

      - name: Run tests
        working-directory: osa13
        run: npm test
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db?sslmode=disable
          PORT: 3001
          SECRET: test_secret

      - name: Print application logs on failure
        if: failure()
        working-directory: osa13
        run: cat app.log

      - name: Stop application
        if: always()
        working-directory: osa13
        run: pkill -f "node index.js" || true
