name: Health check for osa11/fs-pokedex

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '8,28,48 * * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check the status of fs-pokedex app
        uses: jtalk/url-health-check-action@v5
        with:
          url: https://fs-pokedex-a5yl.onrender.com/health
          max-attempts: 3
          retry-delay: 5s
