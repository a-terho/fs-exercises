services:
  devenv:
    build:
      dockerfile: debian.Dockerfile # playwright ei tue alpinea
    container_name: fs-monorepo
    command: sh -c "tail -f /dev/null"
    volumes:
      # sisällytä lähdekoodi kontin luettavaksi
      # erota kuitenkin node_modules omaan volumeen
      - ./:/workspace
      - node_modules:/workspace/node_modules
      # git komentoja varten
      - ~/.gitconfig:/home/node/.gitconfig:ro

    ports:
      - '127.0.0.1:3000-3003:3000-3003' # ulostuleva palvelinliikenne
      - '127.0.0.1:5173-5175:5173-5175' # vite dev
      - '127.0.0.1:9323:9323' # playwright report
      - '127.0.0.1:8000:8000' # esbuild serve
      - '4000:4000' # apollo server
      - '8081:8081' # metro bundler
      - '19000:19000' # metro bundler
      - '19001-19002:19001-19002' # expo dev tools
      - '5001:5001' # rate-repository-api
    environment:
      - NODE_ENV=development
      # MongoDB memory serverin tuki
      - MONGOMS_DISTRO=ubuntu-22.04
      - MONGOMS_PLATFORM=linux
      # Android SDK/expo setup
      - ADB_SERVER_SOCKET=tcp:host.docker.internal:5037
      # Expo Go kännykkäsoftaan yhdistäminen (localhostin ulkopuolelta) vaatii,
      # että kontissa pyörivä metro bundler liitetään host-koneen osoitteeseen,
      # joka ladataan monorepositoryn juuressa sijaitsevasta .env tiedostosta
      - REACT_NATIVE_PACKAGER_HOSTNAME=${EXPO_PUBLIC_HOST_LAN_IP}
      - BROWSER=none
      # - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0

volumes:
  node_modules:
